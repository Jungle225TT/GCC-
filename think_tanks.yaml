# GCC 智库信源配置
#
# 维护说明：
# - 新增/删除智库时优先修改本文件，不需要改主脚本。
# - 每条记录需包含 name/country/tier/region/org_type/topics/base_url/pages/selectors。
# - 有 RSS 时填写 rss_feeds；需要 JS 渲染时设置 use_playwright: true。
# - 合规风险仍在 compliance_rules.yaml 中按域名维护。

