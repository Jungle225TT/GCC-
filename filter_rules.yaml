# GCC智库抓取系统 — 过滤规则配置文件
# 修改此文件后，下次运行时自动加载，无需改动代码。
# 依赖：pip install pyyaml
#
# 两个规则集说明：
#   nav_exact        — 标题精确匹配黑名单（大小写不敏感）
#                      标题完全等于其中任意一项 → 判定为导航/介绍页，丢弃
#   nav_url_patterns — URL 路径正则黑名单（Python re.search，URL 已转小写）
#                      URL 匹配任意一项 → 判定为分类/索引/成员页，丢弃

