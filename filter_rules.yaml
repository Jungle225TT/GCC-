# ── URL 路径正则黑名单（Python re.search，URL 已转小写） ──────────────
nav_url_patterns:

  # 分类/索引/标签页
  - '/category/'
  - '/categories/'
  - '/index/'
  - '/mainpage/category/'
  - '/mainpage/index/'
  - '/list/'
  - '/tag/'
  - '/tags/'
  - '/topic/'
  - '/topics/'
  - '/activity/category/'
  - '/multimedia/'
  - '/release/category/'
  - '/release/index/'

  # SharePoint 站点
  - 'sharepoint\.com'
  - '\.sharepoint\.'

  # 协议类（非 HTTP 链接）
  - '^tel:'
  - '^mailto:'

  # 人物/团队页
  - '/author/'
  - '/authors/'
  - '/researcher/'
  - '/researchers/'
  - '/profile/'
  - '/staff/'
  - '/team/'
  - '/experts/'

  # 音频/多媒体
  - '/podcast'
  - '/podcasts'

  # EPC 话题/单元/关于页面
  - '/featured/'
  - '/units/'
  - '/about-us/'

  # 人物传记/媒体报道
  - '/biography/'
  - '/bio/'
  - '/in-the-news/'
  - '/media-mention'

  # 机构成员页
  - '/leadership/'
  - '/board/'
  - '/fellows/'

  # 活动页
  - '/event/'
  - '/events/'
  - '/webinar/'
  - '/conference/'

  # 订阅/通讯页
  - '/newsletter/'
  - '/newsletters/'
  - '/subscribe'

  # 部门/中心/学科导航页（API、KISR 等网站的 CMS 结构）
  - '[?&]tabid='          # ASPX CMS tab 导航（arab-api.org 等老站）
  - '/sector[s]?/'        # 研究部门
  - '/division[s]?/'      # 部门
  - '/department[s]?/'    # 系/处
  - '/research-center[s]?/'
  - '/research-centre[s]?/'
  - '/center[s]?/(?!brookings|carnegie|doha|gulf)'  # 通用中心页（白名单已知智库名）
  - '/service[s]?/'       # 服务页
  - '/program[s]?/'       # 项目目录
  - '/about/?$'           # /about 或 /about/ 精确匹配
