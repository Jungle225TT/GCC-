# - 2026-05-14 当前 THINK_TANKS 域名盘点；CSV 未覆盖者标记为 manual_domain_inventory。
#
# 使用原则：
# - ToS 判断优先于 robots.txt。
# - robots.txt 作为站点意图和抓取频率参考。
# - 高风险且 scraping 明确禁止的来源默认跳过；如需人工覆盖，使用
